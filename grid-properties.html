<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<d>, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container{
            border: 2px solid aqua;
            padding: 30px;
            background-color: aqua;
        }
        input{
            width: 400px;
            padding: 10px;
            border: 1px solid black;
            background-color: rgba(255, 255, 255, 0.838);
        }
        #button-container{
            margin-top: 30px ;
            display: grid;
            grid-template-columns: auto auto auto auto;
            row-gap: 10px;
            column-gap: 10px;
            background-color: aqua;
        }
        #button-container div{
            border: 2px solid aqua;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            background-color:rgb(165, 229, 5);

        }
        #button-container div:nth-child(16){
            grid-row-start: 4;
            grid-column-start: 4;
            grid-row-end: 6;
        }
    </style>
    </head>
    <body>
    <div class="container">
        <div>
            <input type="number" readonly placeholder="0">
        </div>
        <div id="button-container">
            <div>sin</div>
            <div>tan</div>
            <div>cos</div>
            <div>AC</div>

            <div>9</div>
            <div>8</div>
            <div>7</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>

            <div>*</div>
            <div>1</div>
            <div>2</div>
            <div>3</div>

            <div>-</div>
            <div>=</div>
            <div>8</div>
            <div>/</div>
            <div>+</div>
        </div>
    </div>
</body>
</html>
